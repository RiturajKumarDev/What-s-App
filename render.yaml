services:
  - type: web
    name: whatsapp-bot
    runtime: image
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: PORT
        value: 3000
        
# render.yaml में ये environment variables add करें
envVars:
  - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
    value: true
  - key: PUPPETEER_EXECUTABLE_PATH
    value: /usr/bin/google-chrome-stable
  - key: NODE_ENV
    value: production