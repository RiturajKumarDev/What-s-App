services:
  - type: web
    name: whatsapp-bot
    runtime: image
    repo: https://github.com/RiturajKumarDev/What-s-App
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: PORT
        value: 3000